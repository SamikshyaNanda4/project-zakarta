services:
  postgres:
    image: postgres:17-alpine
    container_name: zakarta-pg-prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zktuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-zkt-db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zktuser} -d ${POSTGRES_DB:-zkt-db}"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    image: samikshyananda4/zkt-backend:${IMAGE_TAG:-latest}
    container_name: zakarta-api-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: ${DATABASE_URL}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET is required}
      BETTER_AUTH_URL: ${BACKEND_URL}
      BACKEND_URL: ${BACKEND_URL}
      FRONTEND_URL: ${FRONTEND_URL}
      API_PORT: ${API_PORT:-3001}
      FRONTEND_PORT: ${FRONTEND_PORT:-3000}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  zakarta:
    image: samikshyananda4/zkt-ui:${IMAGE_TAG:-latest}
    container_name: zakarta-ui-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      # nginx routes /api/* → Hono, so frontend calls go to https://levelvein.online/api
      NEXT_PUBLIC_API_URL: ${BACKEND_URL}
      # Auth client needs the public origin (no /api suffix)
      NEXT_PUBLIC_BETTER_AUTH_URL: ${BACKEND_URL}
    depends_on:
      - api
    networks:
      - internal

  nginx:
    image: nginx:1.27-alpine
    container_name: zakarta-nginx-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - zakarta
      - api
    networks:
      - internal

networks:
  internal:
    driver: bridge

volumes:
  postgres_data:
