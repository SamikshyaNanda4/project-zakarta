## Build the docker image ,
## push the docker image to docker hub
##ssh into our VM and start the new image
name: Continuous Deployment To UI

on:
  push:
    branches:
      - main
      - ZKT-18/19-MonorepoDeployment
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the code
        uses: actions/checkout@v2

      - name: Docker Login via CLI
        uses: docker/login-action@v2
        with:
          username: ${{secrets.DOCKERHUB_USERNAME}}
          password: ${{secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./docker/Dockerfile.zakarta
          push: true
          tags:
            samikshyananda4/zkt-ui:${{github.sha}}
            ##Step to deployt to a VM
